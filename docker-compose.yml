services:
  bootstrap-platform:
    build:
      context: ./platform
    container_name: bootstrap-platform
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8080
    volumes:
      - ./platform/generated-microservices:/app/generated-microservices
      - ./platform/logs:/app/logs
    networks:
      - microservices

  postgres:
    image: postgres:15-alpine
    container_name: bootstrap-postgres
    environment:
      POSTGRES_USER: bootstrap
      POSTGRES_PASSWORD: bootstrap123
      POSTGRES_DB: bootstrap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./platform/init.sql:/docker-entrypoint-initdb.d
    networks:
      - microservices

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - bootstrap-platform
    networks:
      - microservices

volumes:
  postgres_data:

networks:
  microservices: